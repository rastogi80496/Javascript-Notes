<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai aur code</title>
</head>
<body style="background-color: #212121; color: #fff;">
    
</body>


<script>
    // Create new element
    const div = document.createElement('div');
    console.log(div); // <div></div>
    
    div.className = "main"
    div.id = Math.round(Math.random() * 10 + 1);
    div.setAttribute("title", "generated tiltle");
    div.style.backgroundColor = "green";
    div.style.padding = "12px";
    console.log(div); // <div class="main" id="7" title="generated tiltle" style="background-color: green; padding: 12px;"></div>   

    //Add text (not optimised)
    // div.innerText = "Chai aur code"; 
 
    // Add text (better way)
    const addText = document.createTextNode("Chai aur Code");
    div.appendChild(addText); // Add text to div
    console.log(div); // <div class="main" id="7" title="generated tiltle" style="background-color: green; padding: 12px;">Chai aur Code</div>

    document.body.appendChild(div); // Add element to page

</script>
</html>
