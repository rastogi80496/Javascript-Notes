<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai aur code | DOM</title>
</head>
<body style="background-color:#212121; color: #fff">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>

<script>
    function addLangauge(langName){
        const li = document.createElement('li');
        li.innerHTML = langName;
        document.querySelector('.language').appendChild(li);

    }
    addLangauge("Python");
    addLangauge("Java");

    //OPtimised Approach
    function addOptiLangauge(langName) {
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langName));
        document.querySelector('.language').appendChild(li);

    }
    addOptiLangauge("C++");

    //Edit
    const secondLang = document.querySelector("li:nth-child(2)"); 
    console.log(secondLang); // Python
    // secondLang.innerHTML = "Mojo" // Not optimised
    const newli = document.createElement('li');
    newli.textContent = "Mojo";
    secondLang.replaceWith(newli); // Optimised way to replace an element   

    //Edit
    const firstLang = document.querySelector("li:first-child");
    firstLang.outerHTML = '<li>TypeScript</li>'; // Replace entire element with new HTML

    //remove
    const lastLang = document.querySelector("li:last-child");
    lastLang.remove(); // Remove the last language (C++)




</script>
</html>
